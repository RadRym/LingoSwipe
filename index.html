<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LingoSwipe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #0f1923 0%, #0d2b2b 55%, #112820 100%);
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Card stack ── */
    #card-stack {
      position: relative;
      width: 100%;
      max-width: 360px;
      height: 500px;
    }

    .card-wrapper {
      position: absolute;
      inset: 0;
      will-change: transform;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Stack peek effect (set by JS on non-top cards) */
    .card-wrapper[data-stack="1"] { transform: scale(0.95) translateY(10px); filter: brightness(0.92); z-index: 9; }
    .card-wrapper[data-stack="2"] { transform: scale(0.90) translateY(20px); filter: brightness(0.84); z-index: 8; }

    /* ── Flip mechanics ── */
    .card-scene {
      width: 100%;
      height: 100%;
      perspective: 1400px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      will-change: transform;
    }

    .card-inner.is-flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }

    .card-back { transform: rotateY(180deg); }

    /* ── Swipe stamps ── */
    .stamp {
      position: absolute;
      top: 36px;
      padding: 6px 18px;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 0.08s;
    }
    .stamp-yes { left: 20px;  border: 4px solid #22c55e; color: #22c55e; transform: rotate(-12deg); }
    .stamp-no  { right: 20px; border: 4px solid #ef4444; color: #ef4444; transform: rotate(12deg); }

    /* ── Progress dots ── */
    .dot {
      height: 7px; border-radius: 4px;
      background: rgba(255,255,255,0.35);
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .dot.active { background: #fff; width: 22px !important; }
    .dot.done   { background: rgba(255,255,255,0.7); }

    /* ── Action buttons ── */
    .btn-action {
      display: flex; align-items: center; justify-content: center;
      border-radius: 9999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
      color: white;
    }
    .btn-action:hover  { background: rgba(255,255,255,0.25); }
    .btn-action:active { transform: scale(0.88); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    /* ── Completion ── */
    #completion {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0f1923 0%, #0d2b2b 55%, #112820 100%);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem;
    }
    #completion.visible {
      display: flex;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .card-wrapper[data-stack="0"] { z-index: 10; }

    /* ── Tag pills ── */
    .tag { font-size: 11px; background: rgba(0,0,0,0.06); color: #6b7280; padding: 2px 9px; border-radius: 999px; }
    .tag-back { font-size: 11px; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); padding: 2px 9px; border-radius: 999px; }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen" style="min-height:100dvh;">

  <!-- Header -->
  <header class="w-full max-w-md flex items-center justify-between px-5 py-4">
    <div class="flex items-center gap-2">
      <span style="font-size:26px;">🌍</span>
      <span class="text-white font-extrabold text-xl tracking-tight">LingoSwipe</span>
    </div>
    <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full" style="background:rgba(255,255,255,0.18);backdrop-filter:blur(10px);">

      <span class="text-white font-bold text-sm" id="streak">0</span>
      <span class="text-white text-xs" style="opacity:0.7;">streak</span>
    </div>
  </header>

  <!-- Card counter -->
  <p class="text-white text-sm font-medium mb-3" style="opacity:0.75;" id="counter">1 / 22</p>

  <!-- Card stack -->
  <main class="flex-1 flex items-center justify-center w-full max-w-md px-4">
    <div id="card-stack"></div>
  </main>

  <!-- Progress dots -->
  <div class="flex gap-1.5 items-center justify-center mt-4 mb-4 flex-wrap px-6 max-w-xs" id="dots"></div>

  <!-- Action buttons -->
  <footer class="w-full max-w-md flex items-center justify-center gap-5 px-6 pb-6 pt-2">
    <button class="btn-action" style="width:60px;height:60px;font-size:26px;" id="btn-nope" title="Skip (←)">✗</button>
    <button class="btn-action" style="width:52px;height:52px;font-size:20px;" id="btn-flip" title="Flip (Space)">👁️</button>
    <button class="btn-action" style="width:60px;height:60px;font-size:26px;" id="btn-got" title="Got it (→)">✓</button>
  </footer>

  <!-- Completion screen -->
  <div id="completion">
    <div class="text-center" style="animation: popIn 0.5s 0.1s both;">
      <div style="font-size:80px;" class="mb-5">🎉</div>
      <h2 class="text-white font-extrabold text-4xl mb-2">Well done!</h2>
      <p class="text-white mb-1" style="opacity:0.75;font-size:17px;">You went through all the cards!</p>
      <p class="text-white mb-8" style="opacity:0.5;font-size:13px;">Keep it up — habits are built one swipe at a time.</p>

      <div class="rounded-3xl p-6 mb-8" style="background:rgba(255,255,255,0.12);backdrop-filter:blur(16px);">
        <p class="text-white text-xs mb-2" style="opacity:0.6;letter-spacing:1px;text-transform:uppercase;">Session Results</p>
        <p class="text-white font-extrabold" style="font-size:64px;line-height:1;" id="final-learned">0</p>
        <p class="text-white mt-1" style="opacity:0.6;font-size:14px;">cards marked as learned</p>
        <div class="mt-4 h-px" style="background:rgba(255,255,255,0.2);"></div>
        <div class="flex justify-around mt-4">
          <div class="text-center">
            <p class="text-white font-bold text-2xl" id="final-skipped">0</p>
            <p class="text-white text-xs" style="opacity:0.55;">skipped</p>
          </div>
          <div class="text-center">
            <p class="text-white font-bold text-2xl" id="final-streak">0</p>
            <p class="text-white text-xs" style="opacity:0.55;">best streak</p>
          </div>
        </div>
      </div>

      <button id="btn-restart"
        class="font-extrabold text-lg px-10 py-4 rounded-2xl" style="color:#0d3d32;"
        style="background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
        🔄 Play Again
      </button>
    </div>
  </div>

// ─── LEVEL COLOURS ────────────────────────────────────────────────────────────
const LEVEL_COLOR = { A1: '#22c55e', A2: '#3b82f6', B1: '#f59e0b', B2: '#ef4444' };

// ─── STATE ────────────────────────────────────────────────────────────────────
let idx = 0, learned = 0, skipped = 0, streak = 0, bestStreak = 0;
let flipped = false;
let dragging = false, startX = 0, dragX = 0;
const SWIPE_THRESHOLD = 90;

// ─── REFS ─────────────────────────────────────────────────────────────────────
const stackEl    = document.getElementById('card-stack');
const counterEl  = document.getElementById('counter');
const streakEl   = document.getElementById('streak');
const dotsEl     = document.getElementById('dots');
const completion = document.getElementById('completion');

// ─── BUILD CARD HTML ──────────────────────────────────────────────────────────
function cardHTML(card) {
  const levelColor = LEVEL_COLOR[card.level] || '#6366f1';
  const tags = t => card.tags.map(t => `<span class="tag">#${t}</span>`).join('');
  const tagsBk = () => card.tags.map(t => `<span class="tag-back">#${t}</span>`).join('');

  return `
    <div class="stamp stamp-yes">GOT IT!</div>
    <div class="stamp stamp-no">AGAIN</div>
    <div class="card-scene">
      <div class="card-inner">

        <!-- FRONT -->

          </div>

        <!-- BACK -->
        <div class="card-face card-back" style="background:linear-gradient(160deg,#0d2b2b,#0f3d2e);">

            <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 24px 4px;text-align:center;">

              <p style="font-size:13px;color:rgba(255,255,255,0.5);font-style:italic;line-height:1.5;margin-bottom:14px;">"${card.en}"</p>

            <div style="display:flex;flex-wrap:wrap;gap:6px;padding:10px 22px;justify-content:center;">${tagsBk()}</div>

            <div style="display:flex;align-items:center;justify-content:center;gap:6px;padding-bottom:18px;">

      </div>
    </div>`;
}

// ─── RENDER STACK ─────────────────────────────────────────────────────────────
function renderStack() {
  stackEl.innerHTML = '';
  const visible = Math.min(3, DECK.length - idx);

  // Append back-to-front so top card is last child
  for (let i = visible - 1; i >= 0; i--) {
    const w = document.createElement('div');
    w.className = 'card-wrapper';
    w.dataset.stack = i;
    w.innerHTML = cardHTML(DECK[idx + i]);
    stackEl.appendChild(w);
  }

  flipped = false;
  updateMeta();
  attachPointerEvents();
}

function updateMeta() {
  counterEl.textContent = `${idx + 1} / ${DECK.length}`;
  streakEl.textContent = streak;
  renderDots();
}

function renderDots() {
  const MAX_DOTS = 15;
  dotsEl.innerHTML = '';
  if (DECK.length > MAX_DOTS) {
    dotsEl.innerHTML = `<span style="color:rgba(255,255,255,0.6);font-size:12px;">${idx + 1} of ${DECK.length}</span>`;
    return;
  }
  const dotW = Math.min(7, Math.floor(300 / DECK.length) - 3);
  DECK.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
    d.style.width = (i === idx ? 22 : dotW) + 'px';
    dotsEl.appendChild(d);
  });
}

// ─── TOP CARD HELPERS ─────────────────────────────────────────────────────────
function topWrapper()  { return stackEl.lastElementChild; }
function topInner()    { return topWrapper()?.querySelector('.card-inner'); }
function topStampYes() { return topWrapper()?.querySelector('.stamp-yes'); }
function topStampNo()  { return topWrapper()?.querySelector('.stamp-no'); }

// ─── FLIP ─────────────────────────────────────────────────────────────────────
function flip() {
  const inner = topInner();
  if (!inner) return;
  flipped = !flipped;
  inner.style.transition = 'transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  inner.style.transform  = flipped ? 'rotateY(180deg)' : '';
}

// ─── SWIPE OFF ────────────────────────────────────────────────────────────────
function swipeOff(isRight) {
  const inner = topInner();
  if (!inner) return;

  const tx = (isRight ? 1 : -1) * (window.innerWidth + 300);
  const rot = (isRight ? 20 : -20);
  const flipPart = flipped ? ' rotateY(180deg)' : '';

  inner.style.transition = 'transform 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.42s';
  inner.style.transform  = `translateX(${tx}px) rotate(${rot}deg)${flipPart}`;
  inner.style.opacity    = '0';

  if (isRight) {
    learned++;
    streak++;
    bestStreak = Math.max(bestStreak, streak);
  } else {
    skipped++;
    streak = 0;
  }
  streakEl.textContent = streak;

  setTimeout(() => {
    idx++;
    if (idx >= DECK.length) showCompletion();
    else advanceStack();
  }, 400);
}

// ─── POINTER EVENTS ───────────────────────────────────────────────────────────
function attachPointerEvents() {
  const w = topWrapper();
  if (!w) return;
  w.addEventListener('mousedown',  onStart);
  w.addEventListener('touchstart', onStart, { passive: true });
}

function onStart(e) {
  if (e.target.closest('button')) return;
  dragging = true;
  dragX = 0;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
  const inner = topInner();
  if (inner) inner.style.transition = 'none';
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onEnd);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend',  onEnd);
}

function onMove(e) {
  if (!dragging) return;
  if (e.cancelable) e.preventDefault();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  dragX = x - startX;
  const rot = dragX * 0.07 * (flipped ? -1 : 1);
  const flipPart = flipped ? ' rotateY(180deg)' : '';
  const inner = topInner();
  if (inner) inner.style.transform = `translateX(${dragX}px) rotate(${rot}deg)${flipPart}`;

  const progress = Math.min(Math.abs(dragX) / SWIPE_THRESHOLD, 1);
  const sy = topStampYes(), sn = topStampNo();
  if (sy && sn) {
    sy.style.opacity = dragX > 15 ? progress : 0;
    sn.style.opacity = dragX < -15 ? progress : 0;
  }
}

function onEnd() {
  if (!dragging) return;
  dragging = false;
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup',   onEnd);
  document.removeEventListener('touchmove', onMove);
  document.removeEventListener('touchend',  onEnd);

  const inner = topInner();
  const sy = topStampYes(), sn = topStampNo();
  if (sy) sy.style.opacity = 0;
  if (sn) sn.style.opacity = 0;

  if (Math.abs(dragX) >= SWIPE_THRESHOLD) {
    swipeOff(dragX > 0);
  } else {
    if (inner) {
      inner.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
      inner.style.transform  = flipped ? 'rotateY(180deg)' : '';
    }
    if (Math.abs(dragX) < 8) flip();
  }
}

// ─── BUTTON HANDLERS ──────────────────────────────────────────────────────────
document.getElementById('btn-nope').addEventListener('click', () => { if (idx < DECK.length) swipeOff(false); });
document.getElementById('btn-got' ).addEventListener('click', () => { if (idx < DECK.length) swipeOff(true);  });
document.getElementById('btn-flip').addEventListener('click', flip);
document.getElementById('btn-restart').addEventListener('click', () => {
  idx = learned = skipped = streak = bestStreak = 0;
  completion.classList.remove('visible');
  renderStack();
});

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (idx >= DECK.length) return;
  if (e.key === 'ArrowLeft')                     { e.preventDefault(); swipeOff(false); }
  if (e.key === 'ArrowRight')                    { e.preventDefault(); swipeOff(true);  }
  if (e.key === ' ' || e.key === 'Enter')        { e.preventDefault(); flip(); }
});

// ─── COMPLETION ───────────────────────────────────────────────────────────────
function showCompletion() {
  document.getElementById('final-learned').textContent  = learned;
  document.getElementById('final-skipped').textContent  = skipped;
  document.getElementById('final-streak').textContent   = bestStreak;
  completion.classList.add('visible');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderStack();
</script>
</body>
</html>
